name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build DocC Site
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build DocC archive
        run: |
          xcodebuild docbuild \
            -scheme ACRouting \
            -destination "generic/platform=iOS" \
            -derivedDataPath .derivedData-docs \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Locate DocC archive
        id: docc
        run: |
          archive_path="$(find .derivedData-docs -type d -name 'ACRouting.doccarchive' -print -quit)"
          if [[ -z "$archive_path" ]]; then
            echo "Unable to find ACRouting.doccarchive in .derivedData-docs." >&2
            exit 1
          fi

          echo "archive_path=$archive_path" >> "$GITHUB_OUTPUT"

      - name: Transform archive for static hosting
        run: |
          xcrun docc process-archive transform-for-static-hosting \
            "${{ steps.docc.outputs.archive_path }}" \
            --output-path docs-site

      - name: Add site entrypoint
        run: |
          cat > docs-site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>ACRouting Documentation</title>
            <meta http-equiv="refresh" content="0; url=documentation/acrouting/">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <link rel="canonical" href="documentation/acrouting/">
            <script>
              window.location.replace("documentation/acrouting/");
            </script>
          </head>
          <body>
            <p>Redirecting to <a href="documentation/acrouting/">ACRouting documentation</a>...</p>
          </body>
          </html>
          EOF

          touch docs-site/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs-site

  deploy:
    name: Deploy DocC Site
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
