name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Keep this name stable because main branch protection requires it.
    name: Test (Xcode ${{ matrix.xcode }}, iOS ${{ matrix.ios }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - xcode: "26.2"
            ios: "26.2"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData
          key: spm-${{ runner.os }}-${{ matrix.xcode }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ matrix.xcode }}-

      - name: Resolve dependencies
        run: xcodebuild -resolvePackageDependencies -scheme ACRouting -clonedSourcePackagesDirPath .build

      - name: Build
        run: |
          xcodebuild build-for-testing \
            -scheme ACRouting \
            -destination "generic/platform=iOS Simulator" \
            -clonedSourcePackagesDirPath .build

      - name: Test iOS
        run: |
          xcodebuild test \
            -scheme ACRouting \
            -destination "platform=iOS Simulator,OS=${{ matrix.ios }},name=iPhone 17 Pro" \
            -clonedSourcePackagesDirPath .build \
            -resultBundlePath TestResults-iOS.xcresult

      - name: Test macOS
        run: |
          xcodebuild test \
            -scheme ACRouting \
            -destination "platform=macOS" \
            -clonedSourcePackagesDirPath .build \
            -resultBundlePath TestResults-macOS.xcresult

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults-Xcode${{ matrix.xcode }}-iOS${{ matrix.ios }}
          path: |
            TestResults-iOS.xcresult
            TestResults-macOS.xcresult
          retention-days: 7
